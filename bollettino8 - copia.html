<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meteomont Civile - VDA Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .zone-path { transition: all 0.3s; cursor: pointer; stroke: #fff; stroke-width: 1; }
        .danger-1 { fill: #22c55e; background-color: #22c55e; } 
        .danger-2 { fill: #eab308; background-color: #eab308; }
        .danger-3 { fill: #f97316; background-color: #f97316; }
        .danger-4 { fill: #ef4444; background-color: #ef4444; }
        .danger-5 { fill: #7f1d1d; background-color: #7f1d1d; }
        .selected { stroke: #3b82f6; stroke-width: 4; }

        .mountain-container { position: relative; width: 100%; max-width: 240px; margin-bottom: 10px; }
        .mountain-svg { width: 100%; height: auto; }
        .section-path { stroke: #333; stroke-width: 2; fill: white; transition: 0.3s; }
        .death-fill { fill: url(#deathGradient) !important; stroke: #ff0000; }
        
        #altitude-badge {
            position: absolute;
            right: -25px;
            transform: translateY(-50%);
            transition: top 0.1s ease-out;
            z-index: 10;
        }

        button.fascia-btn { border: 1px solid #ccc; padding: 6px 10px; border-radius: 4px; font-weight: bold; font-size: 11px; margin: 1px; }
        .btn-death { background: #600000 !important; color: #ff0000 !important; border: 1px solid #ff0000 !important; }

        .punta-r { fill: #ffffff; stroke: #333; stroke-width: 0.5; cursor: pointer; transition: 0.2s; }
        .punta-l { fill: #cccccc; stroke: #333; stroke-width: 0.5; cursor: pointer; transition: 0.2s; }
        .punta-group:hover .punta-r, .punta-group:hover .punta-l { fill: #cbd5e1; }
        .punta-group.selected .punta-r, .punta-group.selected .punta-l { fill: #1e293b !important; }
        .compass-text { font-family: ui-sans-serif, system-ui; font-weight: 800; pointer-events: none; }
        
        .slot-card { border-left: 6px solid #cbd5e1; transition: 0.2s; }
        .icon-box-large { width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; background: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0; flex-shrink: 0; }
        .icon-box-small { width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; background: #f1f5f9; border-radius: 8px; border: 1px solid #e2e8f0; flex-shrink: 0; }

        /* Menu a Tendina Immagini Personalizzato */
        .image-select-container { position: relative; width: 100%; }
        .image-select-trigger { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 0.25rem 0.5rem; background-color: white; border: 1px solid #e2e8f0; border-radius: 0.375rem; cursor: pointer; }
        .image-select-options { position: absolute; top: 100%; left: 0; width: 100%; background-color: white; border: 1px solid #e2e8f0; border-radius: 0.375rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); z-index: 50; display: none; max-height: 200px; overflow-y: auto; }
        .image-select-container.open .image-select-options { display: block; }
        .image-select-option { display: flex; align-items: center; padding: 0.5rem; cursor: pointer; transition: background 0.2s; }
        .image-select-option:hover { background-color: #f8fafc; }
        .image-select-option img { width: 24px; height: 24px; margin-right: 0.75rem; object-fit: contain; }
        .image-select-option-text { font-size: 10px; font-weight: 600; color: #334155; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans">

    <header class="p-6 border-b border-slate-800 bg-slate-900 shadow-xl">
        <h1 class="text-2xl font-black uppercase italic tracking-tighter text-white">Meteomont <span class="text-blue-500">Aosta</span></h1>
    </header>

    <main class="max-w-7xl mx-auto p-4 lg:p-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-4 bg-slate-900 p-6 rounded-3xl border border-slate-800 shadow-2xl self-start">
            <h2 class="text-lg font-bold mb-6 text-blue-400 uppercase tracking-widest italic underline">Mappa Settori VDA</h2>
            <div id="map-container" class="grid grid-cols-3 gap-3"></div>
        </div>

        <div class="lg:col-span-8">
            <div id="editor-panel" class="bg-white text-slate-900 p-8 rounded-3xl shadow-2xl hidden">
                <div class="flex justify-between items-center mb-6">
                    <h2 id="zone-title" class="text-4xl font-black uppercase italic">SETTORE</h2>
                    <button onclick="closeEditor()" class="text-slate-400 hover:text-red-500 text-3xl font-bold">✕</button>
                </div>

                <div class="bg-slate-50 p-6 rounded-3xl border border-slate-200 shadow-inner mb-8">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-10 items-start">
                        <div class="flex flex-col items-center">
                            <div class="mountain-container">
                                <svg viewBox="0 0 200 200" class="mountain-svg">
                                    <defs>
                                        <linearGradient id="deathGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                            <stop offset="0%" style="stop-color:#000000; stop-opacity:1"><animate attributeName="stop-color" values="#000000;#8b0000;#000000" dur="1s" repeatCount="indefinite" /></stop>
                                            <stop offset="100%" style="stop-color:#ff0000; stop-opacity:1"><animate attributeName="stop-color" values="#ff0000;#000000;#ff0000" dur="1s" repeatCount="indefinite" /></stop>
                                        </linearGradient>
                                    </defs>
                                    <path id="sec0" class="section-path" d="M100 20 L150 110 L50 110 Z" />
                                    <path id="sec1" class="section-path" d="M50 110 L150 110 L190 190 L10 190 Z" />
                                </svg>
                                <div id="altitude-badge" class="bg-blue-600 text-white px-2 py-1 rounded-md text-[10px] font-black shadow-lg">
                                    <span id="val-altitude-badge">2000m</span>
                                </div>
                            </div>
                            <div class="w-full px-4 mt-2">
                                <input type="range" id="input-altitude" min="500" max="4000" step="100" class="w-full h-2 bg-slate-200 rounded-lg accent-blue-600 cursor-pointer">
                                <div class="flex justify-between text-[9px] font-bold text-slate-400 mt-1">
                                    <span>500m</span>
                                    <span class="text-blue-600 font-black text-xs" id="val-altitude-text">2000m</span>
                                    <span>4000m</span>
                                </div>
                            </div>
                        </div>
                        <div class="flex flex-col justify-center h-full space-y-4">
                            <div id="mountain-controls" class="space-y-4"></div>
                            <div id="danger-label" class="text-center py-2 rounded-full text-white font-black text-[11px] shadow-md uppercase tracking-widest mt-4"></div>
                        </div>
                    </div>
                </div>

                <div class="space-y-6 mb-8">
                    <h3 class="text-xs font-black uppercase text-slate-400 border-b-2 border-slate-100 pb-2 italic">Problemi ed Esposizioni</h3>
                    <div id="slots-container" class="grid grid-cols-1 gap-4"></div>
                </div>

                <button onclick="saveData()" class="w-full py-5 bg-slate-900 text-white font-black rounded-2xl hover:bg-blue-600 transition-all shadow-xl text-lg uppercase tracking-widest">PUBBLICA</button>
            </div>

            <div id="placeholder-msg" class="h-full min-h-[400px] flex flex-col items-center justify-center bg-slate-900 border-4 border-dashed border-slate-800 rounded-3xl text-slate-500 p-12 text-center">
                <p class="text-xl font-bold italic">Seleziona un settore sulla mappa.</p>
            </div>
        </div>
    </main>

    <script>
        const sezioniNomi = ["Parte Alta", "Parte Bassa"];
        const coloriOptions = [
            {n: '0', c: '#ffffff'}, {n: '1', c: '#4CAF50'}, {n: '2', c: '#FFEB3B'}, 
            {n: '3', c: '#FF9800'}, {n: '4', c: '#f44336'}, {n: '5', c: 'DEATH', isDeath: true} 
        ];

        // Riferimenti corretti ai file SVG caricati
        const problemiOptions = [
            { id: "0", text: "Nessuno", img: "" },
            { id: "nevefresca", text: "Neve Fresca", img: "nevefresca.svg" },
            { id: "neveventata", text: "Neve Ventata", img: "neveventata.svg" },
            { id: "stratideboli", text: "Strati Deboli", img: "strati deboli.svg" },
            { id: "nevebagnata", text: "Neve Bagnata", img: "nevebagnata.svg" },
            { id: "slittamento", text: "Slittamento", img: "slittamento.svg" }
        ];

        // Riferimenti corretti ai file WEBP/PNG caricati
        const iconeExtraOptions = [
            { id: "0", text: "Seleziona Icona", img: "" },
            { id: "mont_piena", text: "Montagna Piena", img: "montagna piena.webp" },
            { id: "base_vuota", text: "Base Vuota", img: "montbasevuota.webp" },
            { id: "punta_vuota", text: "Punta Vuota", img: "montpuntavuota.webp" },
            { id: "punta_piena", text: "Punta Piena", img: "monpuntapiena.png" }
        ];

        let zonesData = Array.from({ length: 18 }, (_, i) => ({
            id: i + 1, danger: 1, altitude: 2000, fasce: ['#ffffff', '#ffffff'],
            slots: [
                { problema: "0", esposizioni: [], iconaExtra: "0", quotaLibera: "" },
                { problema: "0", esposizioni: [], iconaExtra: "0", quotaLibera: "" },
                { problema: "0", esposizioni: [], iconaExtra: "0", quotaLibera: "" }
            ]
        }));

        let currentId = null;

        document.getElementById('input-altitude').oninput = function() {
            const val = this.value;
            document.getElementById('val-altitude-text').innerText = val + 'm';
            document.getElementById('val-altitude-badge').innerText = val + 'm';
            const percent = (val - this.min) / (this.max - this.min);
            const topPos = 90 - (percent * 75); 
            document.getElementById('altitude-badge').style.top = topPos + '%';
            if(currentId) zonesData.find(z => z.id === currentId).altitude = val;
        };

        function getRoseHTML(slotIdx) {
            const direzioni = [0, 45, 90, 135, 180, 225, 270, 315];
            return `<svg viewBox="-45 -45 290 290" class="w-36 h-36">
                ${direzioni.map((deg, i) => `
                    <g class="punta-group" data-index="${i}" onclick="toggleEsposizione(${slotIdx}, ${i})">
                        <path class="punta-l" d="M 100,100 L 100,20 L 90,80 Z" transform="rotate(${deg} 100 100)"></path>
                        <path class="punta-r" d="M 100,100 L 100,20 L 110,80 Z" transform="rotate(${deg} 100 100)"></path>
                    </g>
                `).join('')}
                <text x="100" y="5" text-anchor="middle" class="compass-text fill-red-600 text-[22px]">N</text>
                <text x="185" y="45" text-anchor="middle" class="compass-text fill-slate-400 text-[14px]">NE</text>
                <text x="215" y="105" text-anchor="middle" class="compass-text fill-slate-500 text-[18px]">E</text>
                <text x="185" y="175" text-anchor="middle" class="compass-text fill-slate-400 text-[14px]">SE</text>
                <text x="100" y="215" text-anchor="middle" class="compass-text fill-slate-500 text-[18px]">S</text>
                <text x="15" y="175" text-anchor="middle" class="compass-text fill-slate-400 text-[14px]">SO</text>
                <text x="-15" y="105" text-anchor="middle" class="compass-text fill-slate-500 text-[18px]">O</text>
                <text x="15" y="45" text-anchor="middle" class="compass-text fill-slate-400 text-[14px]">NO</text>
            </svg>`;
        }

        function createImageSelect(slotIdx, currentIconId) {
            const currentObj = iconeExtraOptions.find(o => o.id === currentIconId);
            const optionsHtml = iconeExtraOptions.map(opt => `
                <div class="image-select-option" onclick="updateIconExtra(${slotIdx}, '${opt.id}')">
                    ${opt.img ? `<img src="${opt.img}">` : `<div class="w-6 h-6 mr-3"></div>`}
                    <span class="image-select-option-text">${opt.text}</span>
                </div>
            `).join('');

            return `
                <div class="image-select-container" id="extra-select-${slotIdx}">
                    <div class="image-select-trigger" onclick="toggleExtraSelect(${slotIdx})">
                        <span class="text-[10px] font-bold text-slate-600">${currentObj.text}</span>
                        <span class="text-[8px]">▼</span>
                    </div>
                    <div class="image-select-options">
                        ${optionsHtml}
                    </div>
                </div>
            `;
        }

        function toggleExtraSelect(idx) {
            document.getElementById(`extra-select-${idx}`).classList.toggle('open');
        }

        function updateIconExtra(slotIdx, val) {
            zonesData.find(z => z.id === currentId).slots[slotIdx].iconaExtra = val;
            renderSlots();
        }

        function renderSlots() {
            const container = document.getElementById('slots-container');
            container.innerHTML = '';
            const zone = zonesData.find(z => z.id === currentId);

            zone.slots.forEach((slot, i) => {
                const probObj = problemiOptions.find(p => p.id === slot.problema);
                const extraObj = iconeExtraOptions.find(e => e.id === slot.iconaExtra);
                
                const div = document.createElement('div');
                div.className = "slot-card p-4 bg-white border-2 border-slate-100 rounded-3xl flex items-start gap-4 shadow-sm";
                div.innerHTML = `
                    <div class="flex flex-col gap-3 w-1/2">
                        <div class="flex items-center gap-3">
                            <div class="icon-box-large">${probObj.img ? `<img src="${probObj.img}" class="w-10 h-10 object-contain">` : `<span class="text-slate-300 text-[10px]">OFF</span>`}</div>
                            <div class="flex-1">
                                <label class="text-[9px] font-black text-blue-500 uppercase italic">Problema ${i+1}</label>
                                <select onchange="updateSlotField(${i}, 'problema', this.value)" class="w-full text-[11px] font-bold p-1.5 bg-slate-50 border border-slate-200 rounded-lg">
                                    ${problemiOptions.map(opt => `<option value="${opt.id}" ${slot.problema === opt.id ? 'selected' : ''}>${opt.text}</option>`).join('')}
                                </select>
                            </div>
                        </div>
                        <div class="flex items-center gap-2 pt-2 border-t border-slate-100">
                            <div class="icon-box-small">${extraObj.img ? `<img src="${extraObj.img}" class="w-6 h-6 object-contain">` : `<span class="text-slate-300 text-[8px]">--</span>`}</div>
                            <div class="flex-1">
                                <label class="text-[8px] font-black text-slate-400 uppercase italic">Inclinazione/Dettaglio</label>
                                ${createImageSelect(i, slot.iconaExtra)}
                            </div>
                        </div>
                        <input type="text" value="${slot.quotaLibera}" oninput="updateSlotField(${i}, 'quotaLibera', this.value)" placeholder="Quota (es. 2500m)" class="w-full text-[10px] p-1.5 bg-slate-50 border border-slate-200 rounded outline-none focus:border-blue-400">
                    </div>
                    <div class="flex-1 flex justify-center bg-slate-50 rounded-2xl p-2 border border-slate-100">
                        ${getRoseHTML(i)}
                    </div>`;
                container.appendChild(div);
                const rose = div.querySelector('svg');
                slot.esposizioni.forEach(espIdx => rose.querySelector(`[data-index="${espIdx}"]`).classList.add('selected'));
            });
        }

        function updateSlotField(slotIdx, field, value) {
            zonesData.find(z => z.id === currentId).slots[slotIdx][field] = value;
            if(field !== 'quotaLibera') renderSlots();
        }

        function toggleEsposizione(sIdx, eIdx) {
            const esp = zonesData.find(z => z.id === currentId).slots[sIdx].esposizioni;
            const index = esp.indexOf(eIdx);
            index > -1 ? esp.splice(index, 1) : esp.push(eIdx);
            renderSlots();
        }

        function renderMainMap() {
            const container = document.getElementById('map-container');
            container.innerHTML = '';
            zonesData.forEach(z => {
                const btn = document.createElement('div');
                btn.className = `zone-path h-20 flex flex-col items-center justify-center rounded-2xl font-black shadow-lg ${currentId === z.id ? 'ring-4 ring-blue-500 scale-105 z-10' : 'opacity-90'} danger-${z.danger}`;
                btn.innerHTML = `<span class="text-[9px] opacity-60 uppercase">Zona</span><span class="text-2xl">${z.id}</span>`;
                btn.onclick = () => selectZone(z.id);
                container.appendChild(btn);
            });
        }

        function selectZone(id) {
            currentId = id;
            const zone = zonesData.find(z => z.id === id);
            document.getElementById('placeholder-msg').classList.add('hidden');
            document.getElementById('editor-panel').classList.remove('hidden');
            document.getElementById('zone-title').innerText = `SETTORE ${id}`;
            const inputAlt = document.getElementById('input-altitude');
            inputAlt.value = zone.altitude;
            inputAlt.dispatchEvent(new Event('input'));
            updateMountainVisuals(zone);
            renderFasceControls(zone);
            renderSlots();
            renderMainMap();
        }

        function renderFasceControls(zone) {
            const ctrlDiv = document.getElementById('mountain-controls');
            ctrlDiv.innerHTML = '';
            sezioniNomi.forEach((nome, i) => {
                const row = document.createElement('div');
                row.className = 'flex flex-col';
                row.innerHTML = `<span class="text-[9px] font-black uppercase text-slate-400 mb-1 italic tracking-widest">${nome}</span><div class="flex gap-1"></div>`;
                const btnContainer = row.querySelector('div');
                coloriOptions.forEach(col => {
                    const btn = document.createElement('button');
                    btn.className = `fascia-btn flex-1 ${col.isDeath ? 'btn-death' : ''}`;
                    if(!col.isDeath) btn.style.background = col.c;
                    btn.innerText = col.n;
                    if((col.isDeath && zone.fasce[i] === 'DEATH') || zone.fasce[i] === col.c) btn.classList.add('ring-2', 'ring-blue-600', 'z-10');
                    btn.onclick = () => {
                        zone.fasce[i] = col.isDeath ? 'DEATH' : col.c;
                        calculateGeneralDanger(zone);
                        updateMountainVisuals(zone);
                        renderFasceControls(zone);
                        renderMainMap();
                    };
                    btnContainer.appendChild(btn);
                });
                ctrlDiv.appendChild(row);
            });
        }

        function updateMountainVisuals(zone) {
            zone.fasce.forEach((col, i) => {
                const el = document.getElementById('sec' + i);
                if (col === 'DEATH') el.classList.add('death-fill');
                else { el.classList.remove('death-fill'); el.style.fill = col; }
            });
            const label = document.getElementById('danger-label');
            label.innerText = `PERICOLO GRADO ${zone.danger}`;
            label.className = `text-center py-2 rounded-full text-white font-black text-[11px] shadow-md uppercase tracking-widest mt-4 danger-${zone.danger}`;
        }

        function calculateGeneralDanger(zone) {
            const weights = {'#ffffff':0, '#4CAF50':1, '#FFEB3B':2, '#FF9800':3, '#f44336':4, 'DEATH':5};
            zone.danger = Math.max(...zone.fasce.map(f => weights[f])) || 1;
        }

        function closeEditor() {
            document.getElementById('editor-panel').classList.add('hidden');
            document.getElementById('placeholder-msg').classList.remove('hidden');
            currentId = null;
            renderMainMap();
        }

        function saveData() { alert("DATI PUBBLICATI CON SUCCESSO"); }
        renderMainMap();
    </script>
</body>
</html>
