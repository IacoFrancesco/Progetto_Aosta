<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mappa AOSTA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f5f3ee; font-family: Georgia, serif; }

        /* Wrapper pagina */
        .page-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 100px;
            gap: 60px;
        }

        /* Legende laterali */
        .legenda-laterale {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .legenda-laterale img {
            max-width: 220px;
            height: auto;
            display: block;
        }

        /* Contenitore fisso della mappa */
        .mappa-box {
            width: 700px;
            height: 700px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .mappa-box h2 {
            font-size: 1rem; color: #444;
            font-weight: normal; letter-spacing: 0.04em;
        }

        .mappa-container {
            width: 100%;
            flex: 1;
        }

        .mappa-container svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Legenda */
        .legenda {
            width: 100%;
            display: flex;
            gap: 16px;
            font-size: 0.78rem;
            color: #444;
            flex-wrap: wrap;
        }

        .legenda-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legenda-colore {
            width: 16px; height: 16px;
            border-radius: 3px;
            border: 1px solid #333;
            flex-shrink: 0;
        }

        /* Zone cliccabili */
        .mappa-container svg path[id] {
            cursor: pointer;
            transition: filter 0.18s, opacity 0.18s;
        }
        .mappa-container svg path[id]:hover {
            filter: brightness(1.35) saturate(1.4);
            opacity: 0.85;
        }
        .mappa-container svg path[id].zona-attiva {
            filter: brightness(1.5) saturate(1.8);
            opacity: 0.9;
        }

        /* Tooltip */
        .tooltip-mappa {
            position: fixed;
            background: rgba(20,20,20,0.85);
            color: #fff;
            padding: 4px 11px;
            border-radius: 12px;
            font-size: 0.73rem;
            letter-spacing: 0.03em;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.12s;
            z-index: 100;
            white-space: nowrap;
        }

        /* Tendina */
        .tendina-wrapper { width: 100%; }
        .tendina {
            max-height: 0; overflow: hidden;
            transition: max-height 0.4s ease, padding 0.3s ease;
            background: #fff;
            border-left: 3px solid #c0392b;
            border-radius: 0 4px 4px 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .tendina.aperta { max-height: 800px; padding: 12px 14px 14px; }
        .tendina-header {
            display: flex; align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .tendina h3 { font-size: 0.82rem; color: #c0392b; margin: 0; font-weight: bold; }
        .chiudi-tendina {
            background: none; border: none; font-size: 0.85rem;
            color: #aaa; cursor: pointer; padding: 1px 5px;
            border-radius: 3px; transition: background 0.12s;
        }
        .chiudi-tendina:hover { background: #f0f0f0; color: #333; }
        .tabella-zone { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        .tabella-zone td { padding: 5px 9px; border-bottom: 1px solid #eee; color: #333; }
        .tabella-zone td:first-child { font-weight: bold; color: #555; width: 42%; }
        .tabella-zone tr:last-child td { border-bottom: none; }
        .placeholder-dati { font-size: 0.75rem; color: #bbb; font-style: italic; margin: 0; }
    </style>
</head>

        5: 'DEATH'
    };

    const dangerLabels = {
        0: 'Nessun dato',
        1: 'Grado 1 — Debole',
        2: 'Grado 2 — Limitato',
        3: 'Grado 3 — Marcato',
        4: 'Grado 4 — Forte',
        5: 'Grado 5 — Molto Forte'
    };

    const fasceLabels = {
        '#ffffff': { txt: 'Nessuno', bg: '#e0e0e0', color: '#555' },
        '#4CAF50': { txt: 'Grado 1', bg: '#4CAF50', color: '#fff' },
        '#FFEB3B': { txt: 'Grado 2', bg: '#FFEB3B', color: '#333' },
        '#FF9800': { txt: 'Grado 3', bg: '#FF9800', color: '#fff' },
        '#f44336': { txt: 'Grado 4', bg: '#f44336', color: '#fff' },
        'DEATH':   { txt: 'Grado 5', bg: 'linear-gradient(135deg,#000,#8b0000)', color: '#ff3333' }
    };

    // Immagini problemi — stessi nomi del bollettino
    const problemiInfo = {
        '0':            { text: 'Nessuno',                      img: '' },
        'nevefresca':   { text: 'Neve Fresca',                  img: 'nevefresca.svg' },
        'neveventata':  { text: 'Neve Ventata',                 img: 'neveventata.svg' },
        'stratideboli': { text: 'Strati Deboli Persistenti',    img: 'strati deboli.svg' },
        'nevebagnata':  { text: 'Neve Bagnata',                 img: 'nevebagnata.svg' },
        'slittamento':  { text: 'Valanghe Di Slittamento',      img: 'slittamento.svg' }
    };

    // Immagini icone extra — stessi nomi del bollettino
    const iconeExtraInfo = {
        '0':           { text: '',               img: '' },
        'mont_piena':  { text: 'Montagna Piena', img: 'montagna piena.webp' },
        'base_vuota':  { text: 'Base Vuota',     img: 'montbasevuota.webp' },
        'punta_vuota': { text: 'Punta Vuota',    img: 'montpuntavuota.webp' },
        'punta_piena': { text: 'Punta Piena',    img: 'monpuntapiena.png' }
    };

    const esposizioniLabels = ['N','NE','E','SE','S','SO','O','NO'];

    // Carica dati salvati dal bollettino
    let bollettino = [];
    try {
        const raw = localStorage.getItem('vda_meteo_data');
        if (raw) bollettino = JSON.parse(raw);
    } catch(e) {}

    // Dizionario nome → dati zona
    const datiPerNome = {};
    bollettino.forEach(z => { datiPerNome[z.nome] = z; });

    // ═══════════════════════════════════════════════════
    //  COLORA LE ZONE SVG
    // ═══════════════════════════════════════════════════
    document.querySelectorAll('.mappa-container svg path[id]').forEach(path => {
        const nome = svgIdToNome[path.id];
        const zona = nome ? datiPerNome[nome] : null;
        if (zona) {
            const isDeath = zona.danger === 5;
            path.setAttribute('fill', isDeath ? '#1a0000' : (dangerColors[zona.danger] || '#cccccc'));
            path.setAttribute('fill-opacity', '0.82');
            path.setAttribute('stroke', '#ffffff');
            path.setAttribute('stroke-width', '4');
        } else {
            path.setAttribute('fill', '#cccccc');
            path.setAttribute('fill-opacity', '0.45');
            path.setAttribute('stroke', '#999');
            path.setAttribute('stroke-width', '3');
        }
    });

    // ═══════════════════════════════════════════════════
    //  LOGICA INTERAZIONE
    // ═══════════════════════════════════════════════════
    const tendina      = document.getElementById('tendina');
    const titoloEl    = document.getElementById('titoloTendina');
    const contenutoEl = document.getElementById('contenutoTendina');
    const tooltip     = document.getElementById('tooltipMappa');

    let zonaAttivaId = null;

    function fasciaBadge(colore) {
        const f = fasceLabels[colore] || fasceLabels['#ffffff'];
        return `<span style="display:inline-block;padding:2px 10px;border-radius:12px;font-size:0.7rem;font-weight:700;
            background:${f.bg};color:${f.color};border:1px solid rgba(0,0,0,0.12);">${f.txt}</span>`;
    }

    function getRosaVentiSVG(esposizioni) {
        const direzioni = [0, 45, 90, 135, 180, 225, 270, 315];
        const punti = direzioni.map((deg, i) => {
            const attiva = esposizioni.includes(i);
            const fillL = attiva ? '#1e293b' : '#cccccc';
            const fillR = attiva ? '#1e293b' : '#ffffff';
            return `<g transform="rotate(${deg} 100 100)">
                <path d="M 100,100 L 100,20 L 90,80 Z" fill="${fillL}" stroke="#333" stroke-width="0.5"/>
                <path d="M 100,100 L 100,20 L 110,80 Z" fill="${fillR}" stroke="#333" stroke-width="0.5"/>
            </g>`;
        }).join('');
        return `<svg viewBox="-55 -55 310 310" width="90" height="90" style="flex-shrink:0;">
            ${punti}
            <text x="100" y="5"   text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="800" fill="#dc2626">N</text>
            <text x="225" y="108" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#64748b">E</text>
            <text x="100" y="225" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#64748b">S</text>
            <text x="-25" y="108" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#64748b">O</text>
            <text x="185" y="35"  text-anchor="middle" font-family="sans-serif" font-size="13" fill="#94a3b8">NE</text>
            <text x="185" y="180" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#94a3b8">SE</text>
            <text x="15"  y="180" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#94a3b8">SO</text>
            <text x="15"  y="35"  text-anchor="middle" font-family="sans-serif" font-size="13" fill="#94a3b8">NO</text>
        </svg>`;
    }

    function apriTendina(id) {
        const nome = svgIdToNome[id] || id;
        const zona = datiPerNome[nome];
        titoloEl.textContent = nome;

        if (!zona) {
            contenutoEl.innerHTML = `<p class="placeholder-dati">Nessun dato — pubblica prima il bollettino.</p>`;
            tendina.classList.add('aperta');
            return;
        }

        const isDeath = zona.danger === 5;
        const fillColor = isDeath ? 'linear-gradient(135deg,#000,#8b0000)' : (dangerColors[zona.danger] || '#ccc');
        const textColor = zona.danger === 2 ? '#333' : '#fff';

        // Badge pericolo principale
        let html = `<div style="background:${fillColor};color:${isDeath ? '#ff3333' : textColor};
            padding:7px 14px;border-radius:16px;font-weight:900;font-size:0.8rem;
            text-transform:uppercase;letter-spacing:0.07em;margin-bottom:12px;
            display:inline-block;border:${isDeath ? '2px solid #ff3333' : '2px solid rgba(0,0,0,0.1)'};
            box-shadow:0 2px 6px rgba(0,0,0,0.15);">
            ⚠ ${dangerLabels[zona.danger]}
        </div>`;

        // Fasce
        html += `<table class="tabella-zone"><tbody>
            <tr>
                <td>Parte Alta</td>
                <td>${fasciaBadge(zona.fasce[0])}</td>
            </tr>
            <tr>
                <td>Parte Bassa</td>
                <td>${fasciaBadge(zona.fasce[1])}</td>
            </tr>
            <tr>
                <td>🏔 Quota neve</td>
                <td><strong>${zona.altitude} m</strong></td>
            </tr>
        </tbody></table>`;

        // Problemi valanghivi
        const slotsAttivi = zona.slots.filter(s => s.problema !== '0');
        if (slotsAttivi.length > 0) {
            html += `<div style="margin-top:10px;font-size:0.68rem;font-weight:700;color:#888;
                text-transform:uppercase;letter-spacing:0.07em;border-top:1px solid #eee;
                padding-top:8px;margin-bottom:8px;">Problemi Valanghivi</div>`;

            slotsAttivi.forEach((slot, i) => {
                const prob   = problemiInfo[slot.problema] || { text: slot.problema, img: '' };
                const extra  = iconeExtraInfo[slot.iconaExtra] || { text: '', img: '' };
                const rosa   = getRosaVentiSVG(slot.esposizioni || []);

                // Riga problema: immagine + testo
                const probImgHTML = prob.img
                    ? `<img src="${prob.img}" style="width:36px;height:36px;object-fit:contain;flex-shrink:0;">`
                    : `<div style="width:36px;height:36px;flex-shrink:0;"></div>`;

                // Icona extra se presente
                const extraHTML = extra.img
                    ? `<div style="display:flex;align-items:center;gap:6px;margin-top:5px;padding-top:5px;border-top:1px solid #eee;">
                        <img src="${extra.img}" style="width:26px;height:26px;object-fit:contain;flex-shrink:0;">
                        <span style="font-size:0.7rem;color:#555;font-weight:600;">${extra.text}</span>
                       </div>`
                    : '';

                html += `<div style="background:#f8f9ff;border:1px solid #e0e4f0;border-radius:8px;
                    padding:10px 12px;margin-bottom:8px;">

                    <div style="font-size:0.68rem;font-weight:700;color:#6366f1;
                        text-transform:uppercase;letter-spacing:0.06em;margin-bottom:7px;">
                        Problema ${i + 1}
                    </div>

                    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;">

                        <div style="flex:1;">
                            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
                                ${probImgHTML}
                                <span style="font-size:0.82rem;font-weight:700;color:#1e293b;">${prob.text}</span>
                            </div>
                            ${extraHTML}
                        </div>

                        <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
                            ${rosa}
                            <span style="font-size:0.62rem;color:#94a3b8;font-weight:600;letter-spacing:0.04em;">ESPOSIZIONI</span>
                        </div>

                    </div>
                </div>`;
            });
        } else {
            html += `<p style="font-size:0.72rem;color:#bbb;font-style:italic;margin-top:8px;
                border-top:1px solid #eee;padding-top:8px;">Nessun problema valanghivo segnalato.</p>`;
        }

        contenutoEl.innerHTML = html;
        tendina.classList.add('aperta');
    }

    document.getElementById('chiudiTendina').addEventListener('click', () => {
        tendina.classList.remove('aperta');
        if (zonaAttivaId) {
            const el = document.getElementById(zonaAttivaId);
            if (el) el.classList.remove('zona-attiva');
            zonaAttivaId = null;
        }
    });

    document.querySelectorAll('.mappa-container svg path[id]').forEach(path => {
        const id   = path.getAttribute('id');
        const nome = svgIdToNome[id] || id;

        path.addEventListener('mouseenter', (e) => {
            tooltip.textContent = nome;
            tooltip.style.opacity = '1';
        });
        path.addEventListener('mousemove', (e) => {
            tooltip.style.left = (e.clientX + 14) + 'px';
            tooltip.style.top  = (e.clientY - 28) + 'px';
        });
        path.addEventListener('mouseleave', () => {
            tooltip.style.opacity = '0';
        });
        path.addEventListener('click', () => {
            if (zonaAttivaId && zonaAttivaId !== id) {
                const prev = document.getElementById(zonaAttivaId);
                if (prev) prev.classList.remove('zona-attiva');
            }
            zonaAttivaId = id;
            path.classList.add('zona-attiva');
            apriTendina(id);
        });
    });
    </script>

</body>
</html>
