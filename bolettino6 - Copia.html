<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meteomont Civile - Valle d'Aosta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Stili Mappa Principale */
        .zone-path { transition: all 0.3s; cursor: pointer; stroke: #fff; stroke-width: 1; }
        .danger-1 { fill: #22c55e; background-color: #22c55e; } 
        .danger-2 { fill: #eab308; background-color: #eab308; }
        .danger-3 { fill: #f97316; background-color: #f97316; } 
        .danger-4 { fill: #ef4444; background-color: #ef4444; }
        .danger-5 { fill: #7f1d1d; background-color: #7f1d1d; }
        .selected { stroke: #3b82f6; stroke-width: 4; }

        /* Stili Montagna */
        .mountain-svg { width: 100%; max-width: 250px; }
        .section-path { stroke: #333; stroke-width: 2; fill: white; transition: 0.3s; }
        .death-fill { fill: url(#deathGradient) !important; stroke: #ff0000; }
        
        button.fascia-btn { border: 1px solid #ccc; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 11px; margin: 1px; }
        .btn-death { background: #600000 !important; color: #ff0000 !important; border: 2px solid #ff0000 !important; }

        /* --- STILI ORIGINALI ROSA DEI VENTI --- */
        .punta-r { fill: #ffffff; stroke: #333; stroke-width: 0.5; cursor: pointer; transition: 0.3s; }
        .punta-l { fill: #cccccc; stroke: #333; stroke-width: 0.5; cursor: pointer; transition: 0.3s; }
        .punta-group.selected .punta-r, .punta-group.selected .punta-l { fill: #222 !important; }
        text { font-family: 'Georgia', serif; font-weight: bold; pointer-events: none; user-select: none; }
        .cardinal { font-size: 16px; fill: #b22222; }
        .intercardinal { font-size: 10px; fill: #444; }
        /* -------------------------------------- */

        details summary { cursor: pointer; list-style: none; outline: none; }
        details summary::-webkit-details-marker { display: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

    <header class="p-6 border-b border-slate-800 bg-slate-900 shadow-xl">
        <h1 class="text-2xl font-black uppercase italic text-white">Meteomont <span class="text-blue-500">Aosta</span></h1>
    </header>

    <main class="max-w-7xl mx-auto p-4 lg:p-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-5 bg-slate-900 p-6 rounded-3xl border border-slate-800 shadow-2xl">
            <h2 class="text-xl font-bold mb-6 text-blue-400 italic underline">🗺️ SELEZIONA ZONA</h2>
            <div id="map-container" class="grid grid-cols-3 gap-3"></div>
        </div>

        <div class="lg:col-span-7">
            <div id="editor-panel" class="bg-white text-slate-900 p-8 rounded-3xl shadow-2xl hidden">
                <div class="flex justify-between items-start mb-6">
                    <h2 id="zone-title" class="text-4xl font-black uppercase italic">Settore</h2>
                    <button onclick="closeEditor()" class="text-slate-400 hover:text-red-500 text-2xl font-bold">✕</button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="bg-slate-100 p-6 rounded-3xl border-2 border-slate-200 flex flex-col items-center">
                        <svg viewBox="0 0 200 200" class="mountain-svg">
                            <defs>
                                <linearGradient id="deathGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" style="stop-color:#000000; stop-opacity:1"><animate attributeName="stop-color" values="#000000;#8b0000;#000000" dur="1s" repeatCount="indefinite" /></stop>
                                    <stop offset="100%" style="stop-color:#ff0000; stop-opacity:1"><animate attributeName="stop-color" values="#ff0000;#000000;#ff0000" dur="1s" repeatCount="indefinite" /></stop>
                                </linearGradient>
                            </defs>
                            <path id="sec0" class="section-path" d="M100 20 L150 110 L50 110 Z" />
                            <path id="sec1" class="section-path" d="M50 110 L150 110 L190 190 L10 190 Z" />
                        </svg>
                        <div class="mt-4"><span id="danger-label" class="px-4 py-1 rounded-full text-white font-black text-xs"></span></div>
                    </div>
                    <div id="mountain-controls" class="space-y-1"></div>
                </div>

                <hr class="my-6 border-slate-200">

                <div class="grid grid-cols-1 gap-4">
                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-400 mb-2">Quota Critica</label>
                        <div class="flex items-center gap-4">
                            <input type="range" id="input-altitude" min="500" max="4000" step="100" class="w-full h-2 bg-slate-200 rounded-lg accent-blue-600">
                            <span class="font-black text-xl text-blue-600 w-24 text-right" id="val-altitude">1500m</span>
                        </div>
                    </div>

                    <details class="group bg-slate-50 border border-slate-200 rounded-2xl p-4 overflow-hidden">
                        <summary class="text-xs font-black uppercase text-slate-600 flex justify-between items-center cursor-pointer">
                            ⚙️ Stato del Manto & Rosa dei Venti
                            <span class="text-slate-400 group-open:rotate-180 transition-transform">▼</span>
                        </summary>
                        
                        <div class="mt-6 flex flex-col md:flex-row items-center justify-between gap-6">
                            <div class="w-full md:w-1/2 space-y-4">
                                <div>
                                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2">Tipologia Neve</label>
                                    <select class="w-full p-3 bg-white border border-slate-200 rounded-xl text-sm outline-none">
                                        <option>Neve Fresca</option>
                                        <option>Neve Ventata</option>
                                        <option>Neve Bagnata</option>
                                    </select>
                                </div>
                                <div class="space-y-2">
                                    <label class="flex items-center gap-2 text-xs"><input type="checkbox"> Evitare pendii ripidi</label>
                                    <label class="flex items-center gap-2 text-xs"><input type="checkbox"> Obbligo Kit A/S/P</label>
                                </div>
                            </div>

                            <div class="w-full md:w-1/2 flex justify-center">
                                <svg viewBox="-20 -20 240 240" style="width: 200px; height: 200px;">
                                    <g class="punta-group" onclick="this.classList.toggle('selected')">
                                        <path class="punta-l" d="M 100,100 L 100,20 L 90,80 Z"></path>
                                        <path class="punta-r" d="M 100,100 L 100,20 L 110,80 Z"></path>
                                    </g>
                                    <g class="punta-group" onclick="this.classList.toggle('selected')">
                                        <path class="punta-l" d="M 100,100 L 155,45 L 110,80 Z"></path>
                                        <path class="punta-r" d="M 100,100 L 155,45 L 120,90 Z"></path>
                                    </g>
                                    <g class="punta-group" onclick="this.classList.toggle('selected')">
                                        <path class="punta-l" d="M 100,100 L 180,100 L 120,90 Z"></path>
                                        <path class="punta-r" d="M 100,100 L 180,100 L 120,110 Z"></path>
                                    </g>
                                    <g class="punta-group" onclick="this.classList.toggle('selected')">
                                        <path class="punta-l" d="M 100,100 L 155,155 L 120,110 Z"></path>
                                        <path class="punta-r" d="M 100,100 L 155,155 L 110,120 Z"></path>
                                    </g>
                                    <g class="punta-group" onclick="this.classList.toggle('selected')">
                                        <path class="punta-l" d="M 100,100 L 100,180 L 110,120 Z"></path>
                                        <path class="punta-r" d="M 100,100 L 100,180 L 90,120 Z"></path>
                                    </g>
                                    <g class="punta-group" onclick="this.classList.toggle('selected')">
                                        <path class="punta-l" d="M 100,100 L 45,155 L 90,120 Z"></path>
                                        <path class="punta-r" d="M 100,100 L 45,155 L 80,110 Z"></path>
                                    </g>
                                    <g class="punta-group" onclick="this.classList.toggle('selected')">
                                        <path class="punta-l" d="M 100,100 L 20,100 L 80,110 Z"></path>
                                        <path class="punta-r" d="M 100,100 L 20,100 L 80,90 Z"></path>
                                    </g>
                                    <g class="punta-group" onclick="this.classList.toggle('selected')">
                                        <path class="punta-l" d="M 100,100 L 45,45 L 80,90 Z"></path>
                                        <path class="punta-r" d="M 100,100 L 45,45 L 90,80 Z"></path>
                                    </g>

                                    <text x="100" y="10" text-anchor="middle" class="cardinal">N</text>
                                    <text x="195" y="105" text-anchor="start" class="cardinal">E</text>
                                    <text x="100" y="198" text-anchor="middle" class="cardinal">S</text>
                                    <text x="5" y="105" text-anchor="end" class="cardinal">O</text>

                                    <text x="160" y="40" text-anchor="start" class="intercardinal">NE</text>
                                    <text x="160" y="165" text-anchor="start" class="intercardinal">SE</text>
                                    <text x="40" y="165" text-anchor="end" class="intercardinal">SO</text>
                                    <text x="40" y="40" text-anchor="end" class="intercardinal">NO</text>
                                </svg>
                            </div>
                        </div>
                    </details>

                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-400 mb-2">Descrizione Civili</label>
                        <textarea id="input-desc" class="w-full p-4 bg-slate-50 border-2 border-slate-200 rounded-2xl h-24 text-sm font-medium focus:outline-none focus:border-blue-500"></textarea>
                    </div>
                    <button onclick="saveData()" class="w-full py-5 bg-slate-900 text-white font-black rounded-2xl hover:bg-blue-600 transition-all shadow-xl">PUBBLICA</button>
                </div>
            </div>

            <div id="placeholder-msg" class="h-full flex flex-col items-center justify-center bg-slate-900 border-2 border-dashed border-slate-800 rounded-3xl p-12 text-slate-500 text-center">
                <p class="text-xl font-bold italic text-slate-400">Seleziona una zona per iniziare.</p>
            </div>
        </div>
    </main>

    <script>
        const sezioniNomi = ["Parte Alta", "Parte Bassa"];
        const coloriOptions = [
            {n: '0', c: '#ffffff'}, {n: '1', c: '#4CAF50'}, 
            {n: '2', c: '#FFEB3B'}, {n: '3', c: '#FF9800'}, 
            {n: '4', c: '#f44336'}, {n: '5', c: 'DEATH', isDeath: true} 
        ];

        let zonesData = Array.from({ length: 18 }, (_, i) => ({
            id: i + 1, danger: 1, altitude: 2000, desc: "", fasce: ['#ffffff', '#ffffff'] 
        }));

        let currentId = null;

        function renderMainMap() {
            const container = document.getElementById('map-container');
            container.innerHTML = '';
            zonesData.forEach(z => {
                const btn = document.createElement('div');
                btn.className = `zone-path h-20 flex flex-col items-center justify-center rounded-2xl font-black danger-${z.danger} ${currentId === z.id ? 'selected scale-105' : ''}`;
                btn.innerHTML = `<span class="text-sm">ZONA</span><span class="text-2xl">${z.id}</span>`;
                btn.onclick = () => selectZone(z.id);
                container.appendChild(btn);
            });
        }

        function selectZone(id) {
            currentId = id;
            const zone = zonesData.find(z => z.id === id);
            document.getElementById('placeholder-msg').classList.add('hidden');
            document.getElementById('editor-panel').classList.remove('hidden');
            document.getElementById('zone-title').innerText = `ZONA ${id}`;
            document.getElementById('input-desc').value = zone.desc;
            document.getElementById('input-altitude').value = zone.altitude;
            document.getElementById('val-altitude').innerText = zone.altitude + 'm';
            updateMountainVisuals(zone);
            renderFasceControls(zone);
            renderMainMap();
        }

        function renderFasceControls(zone) {
            const ctrlDiv = document.getElementById('mountain-controls');
            ctrlDiv.innerHTML = '';
            sezioniNomi.forEach((nome, i) => {
                const row = document.createElement('div');
                row.className = 'py-2 border-b';
                row.innerHTML = `<div class="text-[10px] font-black text-slate-400 uppercase mb-1">${nome}</div>`;
                coloriOptions.forEach(col => {
                    const btn = document.createElement('button');
                    btn.className = `fascia-btn ${col.isDeath ? 'btn-death' : ''}`;
                    if(!col.isDeath) btn.style.background = col.c;
                    btn.innerText = col.n;
                    if( (col.isDeath && zone.fasce[i] === 'DEATH') || zone.fasce[i] === col.c ) {
                        btn.classList.add('ring-2', 'ring-blue-600', 'scale-110');
                    }
                    btn.onclick = () => {
                        zone.fasce[i] = col.isDeath ? 'DEATH' : col.c;
                        calculateGeneralDanger(zone);
                        updateMountainVisuals(zone);
                        renderFasceControls(zone);
                        renderMainMap();
                    };
                    row.appendChild(btn);
                });
                ctrlDiv.appendChild(row);
            });
        }

        function updateMountainVisuals(zone) {
            zone.fasce.forEach((col, i) => {
                const el = document.getElementById('sec' + i);
                if(!el) return;
                if (col === 'DEATH') el.classList.add('death-fill');
                else { el.classList.remove('death-fill'); el.style.fill = col; }
            });
            const label = document.getElementById('danger-label');
            label.innerText = `PERICOLO GRADO ${zone.danger}`;
            label.className = `px-4 py-1 rounded-full text-white font-black text-xs danger-${zone.danger}`;
        }

        function calculateGeneralDanger(zone) {
            const weights = {'#ffffff':0, '#4CAF50':1, '#FFEB3B':2, '#FF9800':3, '#f44336':4, 'DEATH':5};
            const currentWeights = zone.fasce.map(f => weights[f]);
            zone.danger = Math.max(...currentWeights) || 1;
        }

        document.getElementById('input-altitude').oninput = function() {
            document.getElementById('val-altitude').innerText = this.value + 'm';
            if(currentId) zonesData.find(z => z.id === currentId).altitude = this.value;
        };

        function closeEditor() {
            document.getElementById('editor-panel').classList.add('hidden');
            document.getElementById('placeholder-msg').classList.remove('hidden');
            currentId = null;
            renderMainMap();
        }

        function saveData() { alert(`ZONA ${currentId} AGGIORNATA.`); }

        renderMainMap();
    </script>
</body>
</html>
