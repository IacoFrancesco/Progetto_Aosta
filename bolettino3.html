<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meteomont Civile - Valle d'Aosta (Sistema Integrato)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Stili Mappa Principale */
        .zone-path { transition: all 0.3s; cursor: pointer; stroke: #fff; stroke-width: 1; }
        .zone-path:hover { opacity: 0.8; stroke-width: 3; }
        .danger-1 { fill: #22c55e; } .danger-2 { fill: #eab308; }
        .danger-3 { fill: #f97316; } .danger-4 { fill: #ef4444; }
        .danger-5 { fill: #7f1d1d; }
        .selected { stroke: #3b82f6; stroke-width: 4; }

        /* Stili Montagna (Zona 1.0) */
        .mountain-svg { width: 100%; max-width: 300px; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2)); }
        .section-path { stroke: #333; stroke-width: 2; transition: all 0.3s; fill: white; }
        .death-fill { fill: url(#deathGradient) !important; stroke: #ff0000; stroke-width: 3px; }
        
        button.fascia-btn { border: 1px solid #ccc; padding: 4px 8px; cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 11px; margin: 1px; transition: transform 0.1s; }
        button.fascia-btn:active { transform: scale(0.9); }
        .btn-death { background: #600000 !important; color: #ff0000 !important; border: 2px solid #ff0000 !important; box-shadow: 0 0 5px red; text-transform: uppercase; }
        
        .row-fascia { border-bottom: 1px solid #eee; padding: 8px 0; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

    <header class="p-6 border-b border-slate-800 bg-slate-900 shadow-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black tracking-tighter text-white uppercase italic">Meteomont <span class="text-blue-500">Aosta</span></h1>
                <p class="text-xs text-slate-400">Pannello di Controllo Civile v2.0</p>
            </div>
            <div class="text-right">
                <div class="text-[10px] font-bold text-slate-500 uppercase">Stato Sistema</div>
                <div class="text-green-400 font-mono text-xs">● SERVER LIVE</div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 lg:p-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-5 bg-slate-900 p-6 rounded-3xl border border-slate-800 shadow-2xl">
            <h2 class="text-xl font-bold mb-6 flex items-center tracking-tight text-blue-400 italic underline">🗺️ SELEZIONA ZONA VALLE D'AOSTA</h2>
            <div id="map-container" class="grid grid-cols-3 md:grid-cols-3 lg:grid-cols-3 gap-3">
                </div>
        </div>

        <div class="lg:col-span-7">
            <div id="editor-panel" class="bg-white text-slate-900 p-8 rounded-3xl shadow-2xl hidden relative">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h2 id="zone-title" class="text-4xl font-black uppercase italic text-slate-900 leading-none">Settore</h2>
                        <p class="text-sm text-slate-500 mt-2 font-bold uppercase">Configurazione Fasce di Pericolo</p>
                    </div>
                    <button onclick="closeEditor()" class="text-slate-400 hover:text-red-500 text-2xl font-bold">✕</button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="bg-slate-100 p-6 rounded-3xl border-2 border-slate-200 flex flex-col items-center justify-center">
                        <svg viewBox="0 0 200 200" class="mountain-svg">
                            <defs>
                                <linearGradient id="deathGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" style="stop-color:#000000; stop-opacity:1">
                                        <animate attributeName="stop-color" values="#000000;#8b0000;#000000" dur="1s" repeatCount="indefinite" />
                                    </stop>
                                    <stop offset="100%" style="stop-color:#ff0000; stop-opacity:1">
                                        <animate attributeName="stop-color" values="#ff0000;#000000;#ff0000" dur="1s" repeatCount="indefinite" />
                                    </stop>
                                </linearGradient>
                            </defs>
                            <path id="sec1" class="section-path" d="M100 20 L130 70 L70 70 Z" />
                            <path id="sec2" class="section-path" d="M70 70 L130 70 L150 110 L50 110 Z" />
                            <path id="sec3" class="section-path" d="M50 110 L150 110 L175 150 L25 150 Z" />
                            <path id="sec4" class="section-path" d="M25 150 L175 150 L190 190 L10 190 Z" />
                        </svg>
                        <div class="mt-4 flex gap-2">
                             <span id="danger-label" class="px-4 py-1 rounded-full text-white font-black text-xs"></span>
                        </div>
                    </div>

                    <div id="mountain-controls" class="space-y-1">
                        </div>
                </div>

                <hr class="my-6 border-slate-200">

                <div class="grid grid-cols-1 gap-4">
                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-400 mb-2">Quota Critica Selezionata</label>
                        <div class="flex items-center gap-4">
                            <input type="range" id="input-altitude" min="500" max="4000" step="100" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                            <span class="font-black text-xl text-blue-600 w-24 text-right" id="val-altitude">1500m</span>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-400 mb-2">Descrizione per i Civili</label>
                        <textarea id="input-desc" class="w-full p-4 bg-slate-50 border-2 border-slate-200 rounded-2xl h-24 focus:outline-none focus:border-blue-500 text-sm font-medium" placeholder="Es: Neve fresca instabile..."></textarea>
                    </div>
                    <button onclick="saveData()" class="w-full py-5 bg-slate-900 text-white font-black rounded-2xl hover:bg-blue-600 transition-all active:scale-95 shadow-xl shadow-slate-300">
                        PUBBLICA AGGIORNAMENTO ZONA
                    </button>
                </div>
            </div>

            <div id="placeholder-msg" class="h-full flex flex-col items-center justify-center bg-slate-900 border-2 border-dashed border-slate-800 rounded-3xl p-12 text-slate-500">
                <span class="text-6xl mb-4">⚠️</span>
                <p class="text-xl font-bold italic">Seleziona una delle 18 zone a sinistra</p>
                <p class="text-sm">per configurare i pericoli e le fasce di altitudine.</p>
            </div>
        </div>
    </main>

    <script>
        const sezioniNomi = ["Cima", "Fascia Alta", "Fascia Media", "Base"];
        const coloriOptions = [
            {n: '0', c: '#ffffff'}, {n: '1', c: '#4CAF50'}, 
            {n: '2', c: '#FFEB3B'}, {n: '3',  c: '#FF9800'}, 
            {n: '4', c: '#f44336'},
            {n: '5', c: '#330000'}, isDeath: true} 
        ];

        // Database Iniziale per le 18 Zone
        let zonesData = Array.from({ length: 18 }, (_, i) => ({
            id: i + 1,
            name: `Settore ${i + 1}`,
            danger: 1,
            altitude: 2000,
            desc: "",
            fasce: ['#ffffff', '#ffffff', '#ffffff', '#ffffff'] 
        }));

        let currentId = null;

        function renderMainMap() {
            const container = document.getElementById('map-container');
            container.innerHTML = '';
            zonesData.forEach(z => {
                const btn = document.createElement('div');
                btn.className = `zone-path h-20 flex flex-col items-center justify-center rounded-2xl font-black danger-${z.danger} ${currentId === z.id ? 'selected shadow-2xl scale-105' : ''}`;
                btn.innerHTML = `<span class="text-sm">ZONA</span><span class="text-2xl">${z.id}</span>`;
                btn.onclick = () => selectZone(z.id);
                container.appendChild(btn);
            });
        }

        function selectZone(id) {
            currentId = id;
            const zone = zonesData.find(z => z.id === id);
            
            document.getElementById('placeholder-msg').classList.add('hidden');
            const panel = document.getElementById('editor-panel');
            panel.classList.remove('hidden');
            
            document.getElementById('zone-title').innerText = `ZONA ${id}`;
            document.getElementById('input-desc').value = zone.desc;
            document.getElementById('input-altitude').value = zone.altitude;
            document.getElementById('val-altitude').innerText = zone.altitude + 'm';

            updateMountainVisuals(zone);
            renderFasceControls(zone);
            renderMainMap();
        }

        function renderFasceControls(zone) {
            const ctrlDiv = document.getElementById('mountain-controls');
            ctrlDiv.innerHTML = '';
            
            sezioniNomi.forEach((nome, i) => {
                const row = document.createElement('div');
                row.className = 'row-fascia';
                row.innerHTML = `<div class="text-[10px] font-black text-slate-400 uppercase mb-1">${nome}</div>`;
                
                coloriOptions.forEach(col => {
                    const btn = document.createElement('button');
                    btn.className = `fascia-btn ${col.isDeath ? 'btn-death' : ''}`;
                    if(!col.isDeath) btn.style.background = col.c;
                    btn.innerText = col.n;
                    
                    // Highlight se selezionato
                    if( (col.isDeath && zone.fasce[i] === 'DEATH') || zone.fasce[i] === col.c ) {
                        btn.classList.add('ring-2', 'ring-blue-600', 'scale-110');
                    }

                    btn.onclick = () => {
                        zone.fasce[i] = col.isDeath ? 'DEATH' : col.c;
                        calculateGeneralDanger(zone);
                        updateMountainVisuals(zone);
                        renderFasceControls(zone);
                        renderMainMap();
                    };
                    row.appendChild(btn);
                });
                ctrlDiv.appendChild(row);
            });
        }

        function updateMountainVisuals(zone) {
            zone.fasce.forEach((col, i) => {
                const el = document.getElementById('sec' + (i + 1));
                if (col === 'DEATH') {
                    el.classList.add('death-fill');
                } else {
                    el.classList.remove('death-fill');
                    el.style.fill = col;
                }
            });

            // Update Label Pericolo
            const label = document.getElementById('danger-label');
            label.innerText = `PERICOLO GRADO ${zone.danger}`;
            label.className = `px-4 py-1 rounded-full text-white font-black text-xs danger-${zone.danger}`;
        }

        function calculateGeneralDanger(zone) {
            // Logica: il pericolo più alto nelle fasce definisce il pericolo della zona
            if (zone.fasce.includes('DEATH')) zone.danger = 5;
            else if (zone.fasce.includes('#f44336')) zone.danger = 4;
            else if (zone.fasce.includes('#FF9800')) zone.danger = 3;
            else if (zone.fasce.includes('#FFEB3B')) zone.danger = 2;
            else if (zone.fasce.includes('#4CAF50')) zone.danger = 1;
            else zone.danger = 1;
        }

        document.getElementById('input-altitude').oninput = function() {
            document.getElementById('val-altitude').innerText = this.value + 'm';
            if(currentId) zonesData.find(z => z.id === currentId).altitude = this.value;
        };

        function saveData() {
            const zone = zonesData.find(z => z.id === currentId);
            zone.desc = document.getElementById('input-desc').value;
            alert(`SISTEMA AGGIORNATO:\nLa Zona ${currentId} è ora impostata al grado ${zone.danger}.\nQuota critica salvata: ${zone.altitude}m`);
        }

        function closeEditor() {
            document.getElementById('editor-panel').classList.add('hidden');
            document.getElementById('placeholder-msg').classList.remove('hidden');
            currentId = null;
            renderMainMap();
        }

        renderMainMap();
    </script>
</body>
</html>
